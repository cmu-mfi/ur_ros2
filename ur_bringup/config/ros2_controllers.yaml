/**/controller_manager:
  ros__parameters:
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    io_and_status_controller:
      type: ur_controllers/GPIOController

    force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    ur_configuration_controller:
      type: ur_controllers/URConfigurationController

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    admittance_controller:
      type: admittance_controller/AdmittanceController

/**/forward_position_controller:
  ros__parameters:
    joints:
      - $(var tf_prefix)shoulder_pan_joint
      - $(var tf_prefix)shoulder_lift_joint
      - $(var tf_prefix)elbow_joint
      - $(var tf_prefix)wrist_1_joint
      - $(var tf_prefix)wrist_2_joint
      - $(var tf_prefix)wrist_3_joint
    interface_name: position
    
/**/io_and_status_controller:
  ros__parameters:
    tf_prefix: "$(var tf_prefix)"

/**/ur_configuration_controller:
  ros__parameters:
    tf_prefix: "$(var tf_prefix)"

/**/force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: $(var tf_prefix)tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: $(var tf_prefix)tool0_controller
    topic_name: ft_data
    sensor_filter_chain:
      filter1:
        name: fts_lowpass_filter
        type: control_filters/LowPassFilterWrench 
        params:
          sampling_frequency: 500.0 
          damping_frequency: 5.0 
          damping_intensity: 0.2

/**/joint_trajectory_controller:
  ros__parameters:
    joints:
      - $(var tf_prefix)shoulder_pan_joint
      - $(var tf_prefix)shoulder_lift_joint
      - $(var tf_prefix)elbow_joint
      - $(var tf_prefix)wrist_1_joint
      - $(var tf_prefix)wrist_2_joint
      - $(var tf_prefix)wrist_3_joint
    # command_joints:
    #   - admittance_controller/$(var tf_prefix)shoulder_pan_joint
    #   - admittance_controller/$(var tf_prefix)shoulder_lift_joint
    #   - admittance_controller/$(var tf_prefix)elbow_joint
    #   - admittance_controller/$(var tf_prefix)wrist_1_joint
    #   - admittance_controller/$(var tf_prefix)wrist_2_joint
    #   - admittance_controller/$(var tf_prefix)wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

/**/admittance_controller:
  ros__parameters:
    joints:
      - $(var tf_prefix)shoulder_pan_joint
      - $(var tf_prefix)shoulder_lift_joint
      - $(var tf_prefix)elbow_joint
      - $(var tf_prefix)wrist_1_joint
      - $(var tf_prefix)wrist_2_joint
      - $(var tf_prefix)wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    chainable_command_interfaces:
      - position
      - velocity
    # Kinematics 
    kinematics:
      plugin_name: kinematics_interface_kdl/KinematicsInterfaceKDL
      plugin_package: kinematics_interface
      base: "$(var tf_prefix)base_link"
      tip: "$(var tf_prefix)tool0"
      alpha: 0.005
    # Force-Torque Sensor Properties
    ft_sensor:
      name: "$(var tf_prefix)tcp_fts_sensor"
      frame:
        id: "$(var tf_prefix)tool0"
      filter_coefficient: 0.01 # Exponential low-pass filter for sensor noise
    # Coordinate Frames
    control:
      frame:
        id: "$(var tf_prefix)tool0" # Frame where admittance dynamics are computed
    fixed_world_frame:
      frame:
        id: "$(var tf_prefix)base_link" # Gravity must point down (-Z) in this frame
    # Tool Mass & Gravity Compensation
    gravity_compensation:
      frame:
        id: "$(var tf_prefix)tool0"
      CoG:
        pos: [0.0, 0.0, 0.0] # Center of Gravity of your gripper/tool (meters)
        force: 0.0           # Mass of tool * 9.81 (Set to 0.0 if UR driver handles it)
    # Admittance Parameters (X, Y, Z, Roll, Pitch, Yaw)
    admittance:
      selected_axes: [False, False, True, False, False, False]
      mass: [40.0, 40.0, 40.0, 1.0, 1.0, 1.0]
      stiffness: [100.0, 100.0, 100.0, 50.0, 50.0, 50.0]
      damping_ratio: [3.0, 3.0, 3.0, 2.0, 2.0, 2.0]
      joint_damping: 10.0 # Protective damping directly applied in joint space
