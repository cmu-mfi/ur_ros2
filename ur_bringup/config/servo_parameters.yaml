/**:
  ros__parameters:
    # butterworth_filter_coeff: 2.0
    moveit_servo:
      # General
      publish_period: 0.002
      # Moveit Config
      move_group_name: $(var tf_prefix)manipulator
      planning_frame: $(var tf_prefix)base_link
      ee_frame: $(var tf_prefix)tool0
      robot_link_command_frame: $(var tf_prefix)tool0
      is_primary_planning_scene_monitor: false

      # Command in
      command_in_type: "speed_units"
      joint_topic: joint_states
      scale:
        linear: 10.0 # Max Linear Velocity in m/s
        rotational: 10.0 # Max Angular Velocity in rad/s
        joint: 10.0

      # Command out
      # Joint Trajectory Contoller
      command_out_type: trajectory_msgs/JointTrajectory
      command_out_topic: joint_trajectory_controller/joint_trajectory
      # Forward Position Controller
      # command_out_type: std_msgs/Float64MultiArray
      # command_out_topic: forward_position_controller/commands
      publish_joint_positions: true
      publish_joint_velocities: false
      publish_joint_accelerations: false

      # Smoothing
      use_smoothing: false
      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
